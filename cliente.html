<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NutriSanta | QR Code do Cliente</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <script src="app.js" defer></script>
</head>

<body data-page="client">
  <!-- ÍCONES SVG INTERNOS -->
  <svg class="svg-sprite" aria-hidden="true">
    <symbol id="i-leaf" viewBox="0 0 24 24">
      <path d="M20.6 3.4C14.7 3.6 9.8 5.4 6.9 8.3c-2.4 2.4-3 5.6-1.8 8.2L3 18.6 4.4 20l2.1-2.1c2.6 1.2 5.8.6 8.2-1.8 2.9-2.9 4.7-7.8 4.9-13.7Z"/>
      <path d="M7 17c3-4 6.3-7 10.3-9.2"/>
    </symbol>

    <symbol id="i-user" viewBox="0 0 24 24">
      <path d="M20 21a8 8 0 0 0-16 0"/>
      <circle cx="12" cy="7" r="4"/>
    </symbol>

    <symbol id="i-clipboard" viewBox="0 0 24 24">
      <path d="M9 4h6a2 2 0 0 1 2 2v1h1a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1V6a2 2 0 0 1 2-2Z"/>
      <path d="M9 4h6v4H9Z"/>
      <path d="M8 13h8M8 17h5"/>
    </symbol>

    <symbol id="i-store" viewBox="0 0 24 24">
      <path d="M4 10h16"/>
      <path d="M5 10l1-6h12l1 6"/>
      <path d="M6 10v10h12V10"/>
      <path d="M9 20v-6h6v6"/>
    </symbol>

    <symbol id="i-dashboard" viewBox="0 0 24 24">
      <rect x="3" y="3" width="8" height="8" rx="2"/>
      <rect x="13" y="3" width="8" height="5" rx="2"/>
      <rect x="13" y="10" width="8" height="11" rx="2"/>
      <rect x="3" y="13" width="8" height="8" rx="2"/>
    </symbol>

    <symbol id="i-plus" viewBox="0 0 24 24">
      <path d="M12 5v14M5 12h14"/>
    </symbol>

    <symbol id="i-book" viewBox="0 0 24 24">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5Z"/>
    </symbol>

    <symbol id="i-check" viewBox="0 0 24 24">
      <path d="m20 6-11 11-5-5"/>
    </symbol>

    <symbol id="i-search" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/>
      <path d="m21 21-4.3-4.3"/>
    </symbol>

    <symbol id="i-qr" viewBox="0 0 24 24">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <path d="M14 14h2v2h-2ZM18 14h3v3M14 18h3v3M20 20h1v1"/>
    </symbol>

    <symbol id="i-map" viewBox="0 0 24 24">
      <path d="M21 10c0 6-9 12-9 12S3 16 3 10a9 9 0 1 1 18 0Z"/>
      <circle cx="12" cy="10" r="3"/>
    </symbol>

    <symbol id="i-edit" viewBox="0 0 24 24">
      <path d="M12 20h9"/>
      <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>
    </symbol>

    <symbol id="i-image" viewBox="0 0 24 24">
      <rect x="3" y="5" width="18" height="14" rx="2"/>
      <circle cx="8" cy="10" r="2"/>
      <path d="m21 16-5-5L5 19"/>
    </symbol>

    <symbol id="i-arrow-left" viewBox="0 0 24 24">
      <path d="m12 19-7-7 7-7"/>
      <path d="M19 12H5"/>
    </symbol>

    <symbol id="i-upload" viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <path d="m17 8-5-5-5 5"/>
      <path d="M12 3v12"/>
    </symbol>

    <symbol id="i-save" viewBox="0 0 24 24">
      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/>
      <path d="M17 21v-8H7v8"/>
      <path d="M7 3v5h8"/>
    </symbol>

    <symbol id="i-logout" viewBox="0 0 24 24">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <path d="m16 17 5-5-5-5"/>
      <path d="M21 12H9"/>
    </symbol>
  </svg>

  <!-- VISÃO CLIENTE / QR CODE -->
  <section id="clientView" class="screen client-view origin-tree">
    <div class="client-top-actions">
      <button type="button" id="backToAppFromClient" class="client-back-button">
        <svg><use href="#i-arrow-left"></use></svg>
        Ver QR Codes
      </button>

      <button type="button" id="backToClientList" class="client-back-button secondary hidden">
        Voltar à lista
      </button>
    </div>

    <main class="client-shell">
      <section id="clientListPanel" class="client-list-panel">
        <div class="page-heading compact-heading">
          <span class="eyebrow">QR Code NutriSanta</span>
          <h1>QR Codes por categoria</h1>
          <p>
            O cliente acessa somente esta área externa. No GitHub Pages, o QR Code deve apontar para cliente.html?produto=ID, sem abrir login, dashboard ou abas internas.
          </p>
        </div>

        <nav class="client-category-tabs" aria-label="Categorias de alimentos no mercado">
          <button type="button" class="client-category-tab active" data-client-category="Frutas">
            <strong>Frutas</strong>
            <span data-client-category-count>0 itens</span>
          </button>

          <button type="button" class="client-category-tab" data-client-category="Raízes">
            <strong>Raízes</strong>
            <span data-client-category-count>0 itens</span>
          </button>

          <button type="button" class="client-category-tab" data-client-category="Hortaliças">
            <strong>Hortaliças</strong>
            <span data-client-category-count>0 itens</span>
          </button>
        </nav>

        <div id="clientProductList" class="client-product-grid"></div>
      </section>

      <section id="clientDetailPanel" class="client-detail-panel hidden">
        <section class="client-hero">
          <div id="clientPhoto" class="client-photo"></div>

          <div>
            <span id="clientCategory" class="client-badge">Categoria</span>
            <h1 id="clientTitle">Alimento</h1>
            <p id="clientDescription">Descrição do produto selecionado.</p>
          </div>
        </section>

        <nav class="client-section-tabs">
          <button type="button" class="active" data-client-tab="info">
            Informações
          </button>

          <button type="button" data-client-tab="recipes">
            Receitas
          </button>
        </nav>

        <section id="clientInfoPanel" class="client-panel active">
          <div id="clientNutrition" class="nutrition-grid"></div>
          <div id="clientTraceability" class="trace-card"></div>
        </section>

        <section id="clientRecipesPanel" class="client-panel">
          <div id="clientRecipes" class="recipe-grid compact"></div>
        </section>
      </section>
    </main>
  </section>

  <div id="toast" class="toast hidden"></div>
</body>
</html>
