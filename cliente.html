<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NutriSanta | QR Code do Cliente</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
  <script src="app.js" defer></script>
</head>

<body data-page="client">
  <!-- ÍCONES SVG USADOS NA VISÃO DO CLIENTE -->
  <svg class="svg-sprite" aria-hidden="true">
    <symbol id="i-qr" viewBox="0 0 24 24">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <path d="M14 14h2v2h-2ZM18 14h3v3M14 18h3v3M20 20h1v1"/>
    </symbol>

    <symbol id="i-map" viewBox="0 0 24 24">
      <path d="M21 10c0 6-9 12-9 12S3 16 3 10a9 9 0 1 1 18 0Z"/>
      <circle cx="12" cy="10" r="3"/>
    </symbol>

    <symbol id="i-arrow-left" viewBox="0 0 24 24">
      <path d="m12 19-7-7 7-7"/>
      <path d="M19 12H5"/>
    </symbol>

    <symbol id="i-image" viewBox="0 0 24 24">
      <rect x="3" y="5" width="18" height="14" rx="2"/>
      <circle cx="8" cy="10" r="2"/>
      <path d="m21 16-5-5L5 19"/>
    </symbol>

    <symbol id="i-book" viewBox="0 0 24 24">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5Z"/>
    </symbol>
  </svg>

  <!-- TELA PÚBLICA DO CLIENTE -->
  <section id="clientView" class="screen client-view origin-tree active">
    <div class="client-top-actions">
      <button type="button" id="backToAppFromClient" class="client-back-button hidden">
        <svg><use href="#i-arrow-left"></use></svg>
        QR Codes
      </button>

      <button type="button" id="backToClientList" class="client-back-button secondary hidden">
        <svg><use href="#i-arrow-left"></use></svg>
        Voltar à lista
      </button>
    </div>

    <main class="client-shell">
      <!-- LISTA PÚBLICA DE QR CODES -->
      <section id="clientListPanel" class="client-list-panel">
        <div class="page-heading compact-heading">
          <span class="eyebrow">QR Code NutriSanta</span>

          <h1>QR Codes por categoria</h1>

          <p>
            Escolha uma categoria para consultar os alimentos disponíveis no mercado.
            O cliente acessa somente esta área pública, sem login e sem painel administrativo.
          </p>
        </div>

        <nav class="client-category-tabs" aria-label="Categorias de alimentos">
          <button type="button" class="client-category-tab active" data-client-category="Frutas">
            <strong>Frutas</strong>
            <span data-client-category-count>0 itens</span>
          </button>

          <button type="button" class="client-category-tab" data-client-category="Raízes">
            <strong>Raízes</strong>
            <span data-client-category-count>0 itens</span>
          </button>

          <button type="button" class="client-category-tab" data-client-category="Hortaliças">
            <strong>Hortaliças</strong>
            <span data-client-category-count>0 itens</span>
          </button>
        </nav>

        <div id="clientProductList" class="client-product-grid"></div>
      </section>

      <!-- DETALHE PÚBLICO DO PRODUTO -->
      <section id="clientDetailPanel" class="client-detail-panel hidden">
        <section class="client-hero">
          <div id="clientPhoto" class="client-photo"></div>

          <div class="client-hero-content">
            <span id="clientCategory" class="client-badge">Categoria</span>

            <h1 id="clientTitle">Alimento</h1>

            <p id="clientDescription">
              Descrição do produto selecionado.
            </p>
          </div>
        </section>

        <nav class="client-section-tabs">
          <button type="button" class="active" data-client-tab="info">
            Informações
          </button>

          <button type="button" data-client-tab="recipes">
            Receitas
          </button>
        </nav>

        <section id="clientInfoPanel" class="client-panel active">
          <div id="clientNutrition" class="nutrition-grid"></div>

          <div id="clientTraceability" class="trace-card"></div>
        </section>

        <section id="clientRecipesPanel" class="client-panel">
          <div id="clientRecipes" class="recipe-grid compact"></div>
        </section>
      </section>
    </main>
  </section>

  <div id="toast" class="toast hidden"></div>
</body>
</html>
